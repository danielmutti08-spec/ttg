<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE GURU — Premium Travel Editorial</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://esm.sh 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://fonts.googleapis.com https://cdn.tailwindcss.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://esm.sh; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=()">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #ffffff;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
      }
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      .tracking-tightest {
        letter-spacing: -0.05em;
      }
      .tracking-widest-extra {
        letter-spacing: 0.3em;
      }
      .shadow-premium {
        box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
      }
      .hero-title-shadow {
        text-shadow: 0 4px 12px rgba(0,0,0,0.1);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f8f8f8;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e2e2;
        border-radius: 10px;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* ========================================
         DROP CAP + CORSIVO - FONT MIXATO
         ======================================== */

      /* Contenuto articolo - Font normale sito */
      .article-content {
        font-family: inherit; /* Plus Jakarta Sans */
        line-height: 1.8;
        color: #1f2937;
      }

      /* Primo paragrafo (intro) - Font serif elegante + corsivo */
      .article-content > p:first-of-type {
        font-style: italic;
        font-size: 1.2rem;
        color: #4b5563;
        margin-bottom: 2rem;
        line-height: 1.8;
        font-family: 'Georgia', 'Palatino', 'Times New Roman', serif; /* ← SERIF SOLO QUI */
      }

      /* Drop cap - Font serif elegante */
      .article-content > p:first-of-type::first-letter {
        float: left;
        font-size: 4rem;
        line-height: 0.9;
        font-weight: 700;
        color: #3b82f6; /* Azzurro */
        margin-right: 0.5rem;
        margin-top: 0.2rem;
        font-style: normal;
        font-family: 'Georgia', 'Palatino', serif; /* ← SERIF PER DROP CAP */
      }

      /* Paragrafi normali - Font normale sito */
      .article-content > p {
        margin-bottom: 1.5rem;
        font-size: 1.05rem;
        line-height: 1.8;
        font-family: inherit; /* Plus Jakarta Sans */
      }

      /* Titoli sezioni */
      .article-content > h2 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-top: 3rem;
        margin-bottom: 1rem;
        color: #111827;
      }

      .article-content > h3 {
        font-size: 1.4rem;
        font-weight: 600;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
        color: #374151;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@0.475.0",
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "firebase/app": "https://esm.sh/firebase@11.3.1/app",
    "firebase/firestore": "https://esm.sh/firebase@11.3.1/firestore",
    "react/": "https://esm.sh/react@^19.2.4/",
    "firebase/": "https://esm.sh/firebase@^12.9.0/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
